<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card">
        <div class="banner">
            <i class="fa-solid fa-pencil banner-icon"></i>
        </div>
        <img class="profile-pic" src="images/pp.jpg" alt="">

        <div class="card-content">
            <h2 class="name">Bezelye Prenses</h2>
            <h5>Antalya, Türkiye</h5>
            <h3>Web Developer</h3>
            <h4>Bu bir açıklamadır. Adı geçen profil sahibine özel örnek olarak tasarlanmıştır ve gerçekliği yoktur.</h4>

            <div class="social-icons">
                <i class="fa-brands fa-github"></i>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-codepen"></i>
            </div>
        </div>
    </div>
    
</body>
</html>
